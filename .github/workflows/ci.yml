name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Demo smoke test
        run: python -m cortex3 demo --seed 1 --n-per-skill 2
